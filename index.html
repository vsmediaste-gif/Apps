<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kids Learning Hub — تطبيقات تعليمية ممتعة للأطفال</title>
<meta name="description" content="ستّ تطبيقات تعليمية للأطفال: الرياضيات وخمس لغات (الإنجليزية، الفرنسية، الإسبانية، العربية، الصينية). تعلّم باللعب، دون إنترنت، بأربع لغات واجهة." />
<meta property="og:title" content="Kids Learning Hub — Fun learning apps for kids" />
<meta property="og:description" content="6 educational apps: maths + 5 languages. Read · Listen · Speak · Write. Offline, kid-safe, 4 UI languages." />
<meta name="theme-color" content="#5B21B6" />
<link rel="icon" href="logos/hub-logo.png" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#7C3AED; --purple-dark:#5B21B6; --blue:#2563EB; --blue-dark:#1D4ED8;
  --pink:#EC4899; --amber:#F59E0B; --green:#22C55E; --red:#DC2626;
  --text:#1E293B; --muted:#64748B; --bg:#F6F7FB; --card:#FFFFFF; --line:#E9ECF3;
}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  color:var(--text); background:var(--bg); line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
[dir="rtl"] body{font-family:"Segoe UI","Tahoma","Cairo",-apple-system,sans-serif}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

/* ─── Language bar ─── */
.langbar{
  position:sticky;top:0;z-index:100;
  background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;padding:10px 18px;flex-wrap:wrap;
}
.langbar .brand-mini{font-weight:900;font-size:15px;letter-spacing:.3px;display:flex;align-items:center;gap:7px}
.langbar .brand-mini span{background:linear-gradient(90deg,var(--purple),var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent}
.langbar .brand-mini img{width:28px;height:28px;object-fit:contain;border-radius:7px}
.langs{display:flex;gap:5px;flex-wrap:wrap}
.langbtn{
  background:none;border:1.5px solid transparent;padding:6px 13px;border-radius:20px;
  cursor:pointer;font:inherit;font-size:13px;color:var(--muted);font-weight:700;transition:.2s;
}
.langbtn:hover{background:rgba(0,0,0,.04)}
.langbtn.active{background:var(--purple-dark);color:#fff;border-color:var(--purple-dark)}

/* ─── Hero ─── */
.hero{
  position:relative;overflow:hidden;text-align:center;color:#fff;
  padding:64px 22px 84px;
  background:linear-gradient(135deg,#5B21B6 0%,#2563EB 55%,#EC4899 120%);
}
.hero::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(circle at 18% 22%,rgba(255,255,255,.14) 0,transparent 45%),
    radial-gradient(circle at 82% 68%,rgba(255,255,255,.10) 0,transparent 45%);
}
.hero-inner{position:relative;max-width:860px;margin:0 auto}
.hero-logo{width:134px;height:134px;object-fit:contain;margin:0 auto 8px;display:block;filter:drop-shadow(0 12px 26px rgba(0,0,0,.30))}
.hero-wordmark{font-size:clamp(30px,7vw,52px);font-weight:900;letter-spacing:.5px;margin-bottom:12px;line-height:1.05;text-shadow:0 4px 20px rgba(0,0,0,.22)}
.hero-wordmark b{color:#FDE047;font-weight:900}
.kicker{
  display:inline-block;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);
  padding:6px 16px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:18px;backdrop-filter:blur(4px);
}
.hero h1{font-size:clamp(30px,6vw,54px);font-weight:900;line-height:1.15;letter-spacing:.3px;margin-bottom:16px;text-shadow:0 4px 22px rgba(0,0,0,.18)}
.hero p{font-size:clamp(15px,2.2vw,20px);opacity:.95;max-width:620px;margin:0 auto 24px}
.badges{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin:22px 0 6px}
.badge{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;backdrop-filter:blur(4px)}
/* floating app tiles in hero */
.hero-tiles{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:34px}
.hero-tile{
  width:62px;height:62px;border-radius:16px;display:grid;place-items:center;font-size:26px;font-weight:900;color:#fff;
  overflow:hidden;position:relative;
  box-shadow:0 10px 26px rgba(0,0,0,.28);animation:float 4s ease-in-out infinite;
}
.app-icon img,.hero-tile img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero-tile:nth-child(2n){animation-delay:.5s}
.hero-tile:nth-child(3n){animation-delay:1s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}

/* ─── Sections ─── */
section{padding:58px 22px}
.wrap{max-width:1100px;margin:0 auto}
.sec-title{text-align:center;font-size:clamp(24px,3.6vw,34px);font-weight:900;margin-bottom:8px}
.sec-sub{text-align:center;color:var(--muted);max-width:620px;margin:0 auto 40px;font-size:15px}

/* ─── Apps grid ─── */
#apps{background:linear-gradient(180deg,#fff 0,var(--bg) 100%)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.app-card{
  background:var(--card);border:1px solid var(--line);border-radius:22px;padding:22px;
  display:flex;flex-direction:column;gap:14px;transition:transform .22s,box-shadow .22s;
  box-shadow:0 4px 16px rgba(30,41,59,.05);
}
.app-card:hover{transform:translateY(-6px);box-shadow:0 18px 40px rgba(30,41,59,.14)}
.app-top{display:flex;align-items:center;gap:14px}
.app-icon{
  width:70px;height:70px;border-radius:18px;flex:none;display:grid;place-items:center;
  font-size:30px;font-weight:900;color:#fff;box-shadow:0 8px 20px rgba(0,0,0,.16);
  overflow:hidden;position:relative;
}
.app-name{font-size:20px;font-weight:900;line-height:1.15}
.app-subject{font-size:12.5px;font-weight:700;color:var(--muted);margin-top:2px}
.app-tag{color:var(--text);font-size:14.5px;opacity:.85;flex:1}
.play-btn{
  display:inline-flex;align-items:center;gap:11px;background:#111827;color:#fff;
  padding:11px 18px;border-radius:14px;font-weight:800;font-size:14px;align-self:flex-start;
  transition:transform .18s,background .2s;
}
.play-btn:hover{transform:translateY(-2px);background:#000}
.play-btn .g-sub{font-size:10px;font-weight:600;opacity:.8;line-height:1;display:block}
.play-btn .g-main{font-size:15px;font-weight:800;line-height:1.1}
[dir="rtl"] .play-btn{flex-direction:row-reverse}

/* ─── Features ─── */
.feat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.feat{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;transition:transform .2s}
.feat:hover{transform:translateY(-4px)}
.feat .ic{font-size:34px;margin-bottom:10px}
.feat h3{font-size:17px;font-weight:800;margin-bottom:6px}
.feat p{color:var(--muted);font-size:14px}

/* ─── CTA band ─── */
.cta-band{background:linear-gradient(135deg,#1D4ED8,#7C3AED);color:#fff;text-align:center;border-radius:26px;max-width:1100px;margin:0 auto;padding:44px 24px}
.cta-band h2{font-size:clamp(22px,3.2vw,30px);font-weight:900;margin-bottom:10px}
.cta-band p{opacity:.92;margin-bottom:22px}
.cta-band a{display:inline-flex;align-items:center;gap:9px;background:#fff;color:var(--purple-dark);padding:13px 26px;border-radius:30px;font-weight:800;box-shadow:0 10px 26px rgba(0,0,0,.22);transition:transform .2s}
.cta-band a:hover{transform:translateY(-3px)}

/* ─── Footer ─── */
footer{background:#0F172A;color:#CBD5E1;text-align:center;padding:36px 22px;font-size:14px}
footer .fbrand{font-weight:900;color:#fff;font-size:16px;margin-bottom:6px}
footer a{color:#93C5FD}
</style>
</head>

let lang = localStorage.getItem('vsm_lang') || 'ar';

function render(){
  const t = T[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = t.dir;

  // language buttons
  document.getElementById('langs').innerHTML = Object.keys(T).map(k =>
    `<button class="langbtn ${k===lang?'active':''}" onclick="setLang('${k}')">${T[k].label}</button>`).join('');

  // static [data-i] strings
  document.querySelectorAll('[data-i]').forEach(el=>{
    const v = t[el.dataset.i];
    if(typeof v === 'string') el.textContent = v;
  });

  // badges
  document.getElementById('badges').innerHTML = t.badges.map(b=>`<span class="badge">${b}</span>`).join('');

  // hero tiles (real logo, monogram fallback if the file is missing)

  document.getElementById('appGrid').innerHTML = APPS.map(a=>`

      <div class="app-top">
        <div class="app-icon" style="background:linear-gradient(135deg,${a.color},${shade(a.color,-18)})">${a.emoji}<img src="logos/${logoFile(a)}" alt="${a.name[lang]}" loading="lazy" onerror="this.remove()"></div>

        </div>

      <div class="app-tag">${a.tag[lang]}</div>
      <a class="play-btn" href="${playUrl(a.pkg)}" target="_blank" rel="noopener">
        ${playSvg}
        <span><span class="g-sub">${t.download}</span><span class="g-main">Google Play</span></span>
      </a>
    </div>`).join('');

  document.getElementById('featGrid').innerHTML = FEATURES.map(f=>`
    <div class="feat">
      <div class="ic">${f.ic}</div>
      <h3>${f.title[lang]}</h3>
      <p>${f.desc[lang]}</p>
    </div>`).join('');
}

function setLang(k){ lang=k; localStorage.setItem('vsm_lang',k); render(); }

/* nom de fichier du logo, ex. "MathoKids" -> "mathokids.png" */
function logoFile(a){ return a.name.en.toLowerCase() + '.png'; }

/* darken/lighten a hex colour */
function shade(hex, pct){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  r=Math.max(0,Math.min(255,r+Math.round(255*pct/100)));
  g=Math.max(0,Math.min(255,g+Math.round(255*pct/100)));
  b=Math.max(0,Math.min(255,b+Math.round(255*pct/100)));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

render();
</script>
